<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Дэвжээ: Аваргын Зам</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Mongolian&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#D4AF37;--dg:#9A7B0A;--red:#B03A2E;--dr:#6E2119;--blue:#0D1F3C;--db:#07101E;--light:#F5F0E8;--green:#1E8449;--lg:#2ECC71}
html,body{height:100%;overflow:hidden}
body{background:var(--db);color:var(--light);font-family:"Segoe UI",Arial,sans-serif;display:flex;flex-direction:column}
body.lang-trad{font-family:"Noto Serif Mongolian","Segoe UI",serif}

/* ── SCREENS ── */
.scr{display:none;flex-direction:column;height:100%}
.scr.on{display:flex}

/* ═══ START SCREEN ═══ */
#s-start{
  background:radial-gradient(ellipse at 50% 30%,#0d2a50 0%,#07101e 70%);
  align-items:center;justify-content:center;text-align:center;
  position:relative;overflow:hidden
}
.start-deco{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.start-deco::before{
  content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;
  background:repeating-conic-gradient(rgba(212,175,55,.03) 0deg 10deg,transparent 10deg 20deg);
  animation:rotDeco 60s linear infinite
}
@keyframes rotDeco{to{transform:rotate(360deg)}}
.start-orb{position:absolute;border-radius:50%;filter:blur(80px);pointer-events:none}
.orb1{width:400px;height:400px;background:rgba(176,58,46,.12);top:-100px;left:-100px}
.orb2{width:300px;height:300px;background:rgba(212,175,55,.08);bottom:-50px;right:-50px}

.start-inner{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:0}
.s-emblem{font-size:4.5em;margin-bottom:8px;filter:drop-shadow(0 0 20px rgba(212,175,55,.4))}
.s-title{font-size:clamp(2em,6vw,3.2em);font-weight:900;color:var(--gold);letter-spacing:4px;text-shadow:0 0 40px rgba(212,175,55,.5),0 2px 8px #000;line-height:1}
.s-sub{font-size:clamp(.8em,2.2vw,1.05em);color:rgba(212,175,55,.7);letter-spacing:3px;margin-top:4px;margin-bottom:6px}
.s-tagline{font-size:clamp(.65em,1.6vw,.82em);color:rgba(255,255,255,.45);margin-bottom:22px;letter-spacing:1px}

/* Lang picker */
.lang-pick{display:flex;gap:8px;margin-bottom:20px;justify-content:center}
.lp-btn{background:rgba(255,255,255,.06);border:1px solid rgba(212,175,55,.25);color:rgba(255,255,255,.65);padding:7px 18px;border-radius:20px;cursor:pointer;font-size:.85em;transition:.2s;letter-spacing:.5px;white-space:nowrap}
.lp-btn:hover{background:rgba(212,175,55,.15);border-color:rgba(212,175,55,.6);color:var(--gold)}
.lp-btn.on{background:rgba(212,175,55,.2);border-color:var(--gold);color:var(--gold);font-weight:bold;box-shadow:0 0 12px rgba(212,175,55,.2)}
.lp-btn.trad-font{font-family:"Noto Serif Mongolian",serif;font-size:.8em}

/* Start menu */
.s-menu{display:flex;flex-direction:column;gap:9px;width:min(280px,85vw)}
.s-mbtn{background:rgba(255,255,255,.06);border:1px solid rgba(212,175,55,.3);color:var(--light);padding:13px 20px;border-radius:10px;cursor:pointer;font-size:.95em;font-weight:600;letter-spacing:.5px;transition:.25s;display:flex;align-items:center;gap:10px;text-align:left}
.s-mbtn:hover{background:rgba(212,175,55,.15);border-color:var(--gold);transform:translateX(5px);box-shadow:0 4px 18px rgba(212,175,55,.2)}
.s-mbtn.primary{background:linear-gradient(135deg,rgba(176,58,46,.8),rgba(110,33,25,.9));border-color:rgba(212,175,55,.6)}
.s-mbtn.primary:hover{background:linear-gradient(135deg,#c0392b,#922b21)}
.s-ver{margin-top:14px;font-size:.65em;color:rgba(255,255,255,.2)}

/* ═══ SUBSCREEN (howtoplay/about) ═══ */
.sub-scr{background:linear-gradient(180deg,#0d1f3c,#070f1e);overflow-y:auto}
.sub-wrap{max-width:700px;margin:0 auto;padding:20px 16px}
.sub-back{background:none;border:1px solid rgba(212,175,55,.3);color:rgba(212,175,55,.8);padding:6px 14px;border-radius:8px;cursor:pointer;font-size:.82em;margin-bottom:14px;transition:.2s}
.sub-back:hover{background:rgba(212,175,55,.1);color:var(--gold)}
.sub-title{font-size:1.4em;color:var(--gold);margin-bottom:5px;font-weight:bold}
.sub-intro{font-size:.82em;color:rgba(255,255,255,.55);margin-bottom:18px}
.sub-card{background:rgba(255,255,255,.04);border:1px solid rgba(212,175,55,.18);border-radius:10px;padding:14px;margin-bottom:12px}
.sub-card h3{color:var(--gold);font-size:.9em;margin-bottom:9px;display:flex;align-items:center;gap:7px}
.sub-card p,.sub-card li{font-size:.82em;color:rgba(255,255,255,.78);line-height:1.7;margin:3px 0}
.sub-card ul{padding-left:15px}
.htp-g2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:7px}
.htp-box{background:rgba(0,0,0,.2);border-radius:7px;padding:9px;text-align:center}
.htp-box .bi{font-size:1.7em;margin-bottom:4px}
.htp-box h4{color:var(--gold);font-size:.78em;margin-bottom:2px}
.htp-box p{font-size:.72em;color:rgba(255,255,255,.6)}
.td-bar{background:rgba(255,255,255,.08);border:1px solid var(--gold);border-radius:15px;height:24px;position:relative;overflow:hidden;margin:7px 0}
.td-zone{position:absolute;top:0;bottom:0;left:35%;width:24%;background:rgba(0,200,0,.35)}
.td-cur{position:absolute;top:3px;bottom:3px;width:16px;background:var(--gold);border-radius:10px;left:5%;animation:tdSlide 2s linear infinite}
@keyframes tdSlide{0%{left:3%}100%{left:79%}}
.rank-row{display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:4px;margin-top:8px}
.rr-node{text-align:center;font-size:.68em}
.rr-ico{font-size:1.3em}

/* ═══ NEW GAME ═══ */
#s-newgame{background:radial-gradient(ellipse at center,#0d1f3c,#070f1e);align-items:center;justify-content:center}
.ng-box{background:rgba(255,255,255,.04);border:2px solid rgba(212,175,55,.35);border-radius:14px;padding:28px;max-width:380px;width:90%;text-align:center}
.ng-box h2{color:var(--gold);font-size:1.25em;margin-bottom:5px}
.ng-box .ng-sub{font-size:.8em;color:rgba(255,255,255,.55);margin-bottom:18px}
.ng-input{background:rgba(255,255,255,.07);border:1px solid rgba(212,175,55,.35);color:var(--light);padding:11px 14px;border-radius:8px;font-size:1em;width:100%;text-align:center;margin-bottom:12px}
.ng-input:focus{outline:none;border-color:var(--gold);background:rgba(212,175,55,.08)}
.ng-presets{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:16px}
.ng-pre{background:rgba(212,175,55,.08);border:1px solid rgba(212,175,55,.25);color:rgba(255,255,255,.7);padding:4px 11px;border-radius:12px;cursor:pointer;font-size:.78em;transition:.2s}
.ng-pre:hover{background:rgba(212,175,55,.2);color:var(--gold)}

/* ═══ GAME SCREEN ═══ */
#s-game{flex-direction:column;height:100%}
.g-hdr{background:linear-gradient(90deg,var(--dr),#c0392b,var(--dr));border-bottom:2px solid rgba(212,175,55,.5);padding:6px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.gh-l{display:flex;align-items:center;gap:8px}
.gh-logo{font-size:.88em;color:var(--gold);font-weight:bold;letter-spacing:1px}
.gh-name{font-size:.8em;color:rgba(255,255,255,.8)}
.gh-r{display:flex;align-items:center;gap:6px}
.gh-stats{display:flex;gap:5px}
.gh-s{background:rgba(0,0,0,.3);padding:2px 6px;border-radius:6px;font-size:.72em;color:rgba(255,255,255,.75)}
.gh-s span{color:var(--gold);font-weight:bold}
.gh-rank{background:var(--gold);color:var(--blue);padding:2px 8px;border-radius:8px;font-size:.75em;font-weight:bold}
.gh-gold{background:rgba(212,175,55,.12);border:1px solid rgba(212,175,55,.3);color:var(--gold);padding:2px 7px;border-radius:8px;font-size:.73em;font-weight:bold}
/* compact lang switcher in header */
.gh-lang{display:flex;gap:3px}
.gh-lb{background:rgba(0,0,0,.3);border:1px solid rgba(212,175,55,.2);color:rgba(255,255,255,.5);padding:2px 6px;border-radius:6px;cursor:pointer;font-size:.65em;transition:.15s;white-space:nowrap}
.gh-lb:hover,.gh-lb.on{background:rgba(212,175,55,.18);border-color:var(--gold);color:var(--gold)}
.gh-lb.trad-font{font-family:"Noto Serif Mongolian",serif}

.g-body{display:flex;flex:1;overflow:hidden}
.g-nav{width:148px;background:rgba(5,12,25,.95);border-right:1px solid rgba(212,175,55,.18);display:flex;flex-direction:column;padding:5px 0;flex-shrink:0;overflow-y:auto}
.nsec{padding:5px 12px 2px;font-size:.6em;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:1px;margin-top:4px}
.nb{background:none;border:none;color:rgba(255,255,255,.65);padding:9px 12px;text-align:left;cursor:pointer;font-size:.83em;transition:.18s;border-left:3px solid transparent;display:flex;align-items:center;gap:7px;width:100%}
.nb:hover,.nb.on{background:rgba(212,175,55,.09);border-left-color:var(--gold);color:var(--gold)}
.nb .ni{font-size:.95em;width:15px;text-align:center;flex-shrink:0}
.g-con{flex:1;overflow-y:auto;padding:14px;scrollbar-width:thin;scrollbar-color:var(--gold) transparent}
.g-con::-webkit-scrollbar{width:4px}
.g-con::-webkit-scrollbar-thumb{background:var(--gold);border-radius:4px}
.pnl{display:none}.pnl.on{display:block}
.ptitle{font-size:1.05em;color:var(--gold);margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid rgba(212,175,55,.2);display:flex;align-items:center;gap:7px}

/* ── SHARED ── */
.card{background:rgba(255,255,255,.04);border:1px solid rgba(212,175,55,.18);border-radius:9px;padding:12px;margin:7px 0}
.card h3{color:var(--gold);font-size:.86em;margin-bottom:8px;display:flex;align-items:center;gap:5px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
@media(max-width:480px){.g2{grid-template-columns:1fr}}
.btn{background:linear-gradient(180deg,var(--gold),var(--dg));color:var(--blue);border:none;padding:7px 14px;border-radius:7px;cursor:pointer;font-weight:bold;font-size:.82em;transition:.18s;display:inline-flex;align-items:center;gap:5px}
.btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 4px 10px rgba(212,175,55,.3)}
.btn:disabled{opacity:.38;cursor:not-allowed;transform:none}
.btn-r{background:linear-gradient(180deg,#c0392b,var(--dr));color:#fff}
.btn-b{background:linear-gradient(180deg,#2471A3,#1a5276);color:#fff}
.btn-g{background:linear-gradient(180deg,#1E8449,#145a32);color:#fff}
.btn-sm{padding:5px 10px;font-size:.76em}
.srow{display:flex;align-items:center;gap:7px;margin:5px 0;font-size:.79em}
.slbl{width:85px;color:var(--gold);font-size:.84em;flex-shrink:0}
.sbar{background:rgba(255,255,255,.07);border-radius:5px;height:8px;flex:1;overflow:hidden}
.sfill{height:100%;border-radius:5px;transition:width .5s}
.sval{width:22px;text-align:right;font-weight:bold;font-size:.82em}
.ib{background:rgba(212,175,55,.07);border:1px solid rgba(212,175,55,.25);border-radius:7px;padding:8px 11px;font-size:.78em;color:rgba(255,255,255,.78);line-height:1.6;margin:6px 0}
.ib.blue{background:rgba(36,113,163,.08);border-color:rgba(36,113,163,.3);color:rgba(200,230,255,.85)}
.ib.green{background:rgba(30,132,73,.08);border-color:rgba(30,132,73,.3);color:rgba(150,220,150,.9)}

/* ── HOME ── */
.wrow{display:flex;gap:7px;margin:7px 0}
.wbox{flex:1;background:rgba(255,255,255,.03);border-radius:6px;padding:7px;text-align:center}
.wbox .wn{font-size:1.35em;font-weight:bold;color:var(--gold)}
.wbox .wl{font-size:.65em;color:rgba(255,255,255,.45);margin-top:1px}
.xp-bar{background:rgba(255,255,255,.07);border-radius:5px;height:8px;overflow:hidden;margin:5px 0}
.xp-fill{height:100%;background:linear-gradient(90deg,#7d3c98,#a569bd);border-radius:5px;transition:width .6s}
.rpath{display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:4px;padding:8px 0}
.rnode{text-align:center}
.rcirc{width:44px;height:44px;border-radius:50%;border:2px solid rgba(212,175,55,.18);display:flex;align-items:center;justify-content:center;font-size:1.3em;margin:0 auto 3px;transition:.3s}
.rcirc.a{border-color:var(--gold);background:rgba(212,175,55,.14);box-shadow:0 0 8px rgba(212,175,55,.3)}
.rcirc.c{border-color:var(--gold);background:rgba(212,175,55,.22);box-shadow:0 0 16px rgba(212,175,55,.5);animation:rp 1.8s infinite}
@keyframes rp{0%,100%{box-shadow:0 0 14px rgba(212,175,55,.5)}50%{box-shadow:0 0 26px rgba(212,175,55,.85)}}
.rname{font-size:.6em;color:rgba(212,175,55,.8)}
.rarrow{color:rgba(212,175,55,.3);font-size:.9em;padding:0 1px}
.ch-item{background:rgba(255,255,255,.03);border:1px solid rgba(212,175,55,.18);border-radius:7px;padding:9px 10px;margin:5px 0;display:flex;align-items:center;gap:9px}
.ch-item.done{border-color:rgba(39,174,96,.35);background:rgba(39,174,96,.04)}
.ch-prog{background:rgba(255,255,255,.07);border-radius:3px;height:4px;margin-top:4px}
.ch-pf{height:100%;background:linear-gradient(90deg,var(--gold),#f0c040);border-radius:3px;transition:width .3s}

/* ── BATTLE ── */
#bCanvas{width:100%;max-width:540px;border-radius:9px;border:2px solid rgba(212,175,55,.4);display:block;margin:0 auto 9px;background:#080f1e}
.bhprow{display:flex;gap:9px;max-width:540px;margin:5px auto}
.bcp{flex:1}
.bcn{font-size:.76em;margin-bottom:2px;display:flex;justify-content:space-between}
.bhb{background:rgba(255,255,255,.07);border-radius:5px;height:12px;overflow:hidden}
.bhf{height:100%;border-radius:5px;transition:width .4s}
.p-hp{background:linear-gradient(90deg,#1a5c2a,var(--lg))}
.e-hp{background:linear-gradient(90deg,var(--dr),#e74c3c)}
.b-rule{font-size:.74em;color:rgba(255,255,255,.5);text-align:center;max-width:540px;margin:4px auto;min-height:1.2em}
.tw{max-width:540px;margin:9px auto;display:none}
.tlbl{text-align:center;font-size:.8em;color:var(--gold);font-weight:bold;margin-bottom:4px}
.tbar{background:rgba(255,255,255,.07);border:2px solid var(--gold);border-radius:18px;height:28px;position:relative;overflow:hidden;cursor:pointer;user-select:none}
.tz{position:absolute;top:0;bottom:0;background:rgba(0,220,0,.33)}
.tc{position:absolute;top:3px;bottom:3px;width:18px;background:var(--gold);border-radius:10px}
.thint{text-align:center;font-size:.72em;color:rgba(255,255,255,.4);margin-top:3px}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px;max-width:540px;margin:7px auto}
.mb{background:rgba(255,255,255,.04);border:1px solid rgba(212,175,55,.22);color:var(--light);padding:8px;border-radius:7px;cursor:pointer;text-align:left;transition:.18s;font-size:.79em}
.mb:hover:not(:disabled){background:rgba(212,175,55,.13);border-color:var(--gold)}
.mb:disabled{opacity:.32;cursor:not-allowed}
.mb .mn{font-weight:bold;color:var(--gold);display:block;margin-bottom:1px;font-size:.92em}
.mb .ms{font-size:.72em;color:rgba(255,255,255,.48);display:block;margin-bottom:3px}
.mb .mst{font-size:.7em;display:flex;gap:7px}
.mp{color:#e74c3c}.mc2{color:#3498db}
.blog{max-width:540px;margin:6px auto;background:rgba(0,0,0,.22);border:1px solid rgba(255,255,255,.05);border-radius:6px;padding:6px 9px;max-height:85px;overflow-y:auto;font-size:.76em;scrollbar-width:thin}
.le{padding:2px 0;border-bottom:1px solid rgba(255,255,255,.03)}
.le.s{color:#2ecc71}.le.f{color:#e74c3c}.le.i{color:var(--gold)}.le.e{color:#e67e22}.le.n{color:rgba(255,255,255,.55)}
.osel{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:7px;max-width:540px;margin:0 auto}
.ocard{background:rgba(255,255,255,.03);border:1px solid rgba(212,175,55,.18);border-radius:8px;padding:10px;text-align:center;cursor:pointer;transition:.2s}
.ocard:hover:not(.lk){border-color:var(--gold);background:rgba(212,175,55,.08);transform:translateY(-2px)}
.ocard.lk{opacity:.35;cursor:not-allowed}
.oico{font-size:1.7em;margin-bottom:4px}
.oname{font-size:.82em;font-weight:bold;color:var(--gold);margin-bottom:2px}
.odesc{font-size:.7em;color:rgba(255,255,255,.5);margin-bottom:4px}

/* ── TRAINING ── */
.trgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:9px}
.trcard{background:rgba(255,255,255,.03);border:1px solid rgba(212,175,55,.18);border-radius:9px;padding:13px;text-align:center;cursor:pointer;transition:.22s}
.trcard:hover:not(.dis){border-color:var(--gold);background:rgba(212,175,55,.07);transform:translateY(-3px)}
.trcard.dis{opacity:.38;cursor:not-allowed}
.trico{font-size:1.9em;margin-bottom:6px}
.trcard h4{color:var(--gold);font-size:.82em;margin-bottom:3px}
.trcard p{font-size:.72em;color:rgba(255,255,255,.5);margin-bottom:4px}
.trgain{font-size:.71em;color:var(--lg);font-weight:bold}
.mga{background:rgba(0,0,0,.28);border:2px solid var(--gold);border-radius:11px;padding:16px;max-width:340px;margin:12px auto;display:none;text-align:center}
.mga h3{color:var(--gold);font-size:.9em;margin-bottom:5px}
.mga p{font-size:.79em;color:rgba(255,255,255,.68);margin-bottom:9px}
.mga-bar{background:rgba(255,255,255,.07);border:1px solid var(--gold);border-radius:12px;height:18px;overflow:hidden;max-width:260px;margin:7px auto}
.mga-fill{height:100%;background:linear-gradient(90deg,var(--gold),#f0c040);border-radius:12px;width:0;transition:width .08s}
.mga-tim{font-size:.83em;color:var(--gold);margin:4px 0;font-weight:bold}
.mga-hint{font-size:.73em;color:rgba(255,255,255,.4);margin-bottom:7px}

/* ── TOURNAMENT ── */
.tlvl{background:rgba(255,255,255,.03);border:1px solid rgba(212,175,55,.18);border-radius:9px;padding:12px;margin:7px 0}
.tlvl h3{color:var(--gold);font-size:.87em;margin-bottom:7px}
.tmatch{background:rgba(0,0,0,.18);border:1px solid rgba(255,255,255,.06);border-radius:6px;padding:7px 10px;display:flex;align-items:center;gap:7px;margin:4px 0;font-size:.79em}
.tmatch.ac{border-color:var(--gold);background:rgba(212,175,55,.06)}
.tvs{color:var(--gold);font-weight:bold;margin:0 4px}
.tw2{color:var(--lg);font-weight:bold}.tl2{color:#e74c3c;font-weight:bold}.tbd{color:rgba(255,255,255,.35)}

/* ── SHOP ── */
.shgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:9px}
.shcard{background:rgba(255,255,255,.03);border:1px solid rgba(212,175,55,.18);border-radius:9px;padding:12px;text-align:center;transition:.2s}
.shcard:hover{border-color:rgba(212,175,55,.4);background:rgba(212,175,55,.05)}
.shcard.own{border-color:rgba(39,174,96,.35);background:rgba(39,174,96,.03)}
.shico{font-size:2em;margin-bottom:5px}
.shname{font-size:.82em;font-weight:bold;color:var(--gold);margin-bottom:2px}
.shdesc{font-size:.7em;color:rgba(255,255,255,.5);margin-bottom:4px}
.shbon{font-size:.7em;color:var(--lg);margin-bottom:5px;font-weight:bold}
.gdisplay{background:rgba(212,175,55,.08);border:1px solid rgba(212,175,55,.3);border-radius:7px;padding:5px 11px;font-size:.82em;color:var(--gold);font-weight:bold;display:inline-flex;align-items:center;gap:5px;margin-bottom:10px}

/* ── ACHIEVEMENTS ── */
.achgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:9px}
.achcard{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:9px;padding:11px;text-align:center;transition:.2s}
.achcard.u{border-color:rgba(212,175,55,.45);background:rgba(212,175,55,.06)}
.achcard.lk{opacity:.4;filter:grayscale(.7)}
.achico{font-size:1.9em;margin-bottom:4px}
.achname{font-size:.78em;font-weight:bold;color:var(--gold);margin-bottom:2px}

// ═══ SCREENS ═══
function goScr(id) {
  document.querySelectorAll('.scr').forEach(s => s.classList.remove('on'));
  document.getElementById(id).classList.add('on');
  if(id==='s-htp') buildHtp();
  if(id==='s-about') buildAbout();
}

// ═══ LANGUAGE ═══
function setLang(l) {
  lang = l;
  ['mn','en','tr'].forEach(x => {
    const b = document.getElementById('lp-'+x);
    if(b) b.classList.toggle('on', x===l);
    const g = document.getElementById('gl-'+x);
    if(g) g.classList.toggle('on', x===l);
  });
  document.body.className = l==='tr' ? 'lang-trad' : '';
  const t = S[l];
  // start screen
  el('sTitle').textContent = t.gameTitle;
  el('sSub').textContent = t.gameSub;
  el('sTag').textContent = t.tagline;
  buildStartMenu();
  // new game screen
  el('ngTitle').textContent = t.ngTitle;
  el('ngSub').textContent = t.ngSub;
  el('ngStartBtn').textContent = t.ngStart;
  el('ngBackBtn').textContent = t.btnBack;
  buildPresets();
  buildHtp();
  buildAbout();
  // in-game
  if(gs) {
    el('ghLogo').textContent = t.gameTitle;
    el('ghName').textContent = gs.name;
    buildNav();
    renderPanel(curPanel);
  }
}

function el(id){ return document.getElementById(id); }
function t(){ return S[lang]; }

// ═══ START MENU ═══
function buildStartMenu() {
  const tx = S[lang];
  el('sMenu').innerHTML = `
    <button class="s-mbtn primary" onclick="goScr('s-ng')">${tx.btnPlay}</button>
    <button class="s-mbtn" onclick="goScr('s-htp')">${tx.btnHtp}</button>
    <button class="s-mbtn" onclick="goScr('s-about')">${tx.btnAbout}</button>
  `;
}

function buildPresets() {
  const tx = S[lang];
  el('ngPresets').innerHTML = tx.presets.map(p =>
    `<button class="ng-pre" onclick="el('nameIn').value='${p}'">${p}</button>`
  ).join('');
}

function doStart() {
  const name = el('nameIn').value.trim() || S[lang].presets[0];
  const tx = S[lang];
  gs = {
    name, lang,
    rank:0, xp:0, gold:30,
    day:1, wins:0, losses:0,
    stamina:100, maxStam:100,
    str:10, spd:10, bal:10, end:10,
    moves:[0,1], // unlocked move indices
    shopOwned:[true,false,false,false,false,false],
    equip:0,
    achs:{},
    daily:{trains:0, battleWon:0, challengeIdx:Math.floor(Math.random()*tx.challengeList.length)},
    tourDone:[false,false,false],
    costume:0,
    quizScore:0
  };
  goScr('s-game');
  el('ghLogo').textContent = tx.gameTitle;
  el('ghName').textContent = name;
  buildNav();
  renderPanel('home');
  updateHeader();
  showModal(tx.welcomeTitle, '🎉', gs.name+' '+tx.welcomeMsg, [{l:tx.gotIt}]);
}

// ═══ HEADER ═══
function updateHeader() {
  if(!gs) return;
  const tx = S[lang];
  const ri = gs.rank;
  el('hStr').innerHTML = `🗡️<span>${gs.str}</span>`;
  el('hSpd').innerHTML = `⚡<span>${gs.spd}</span>`;
  el('hBal').innerHTML = `⚖️<span>${gs.bal}</span>`;
  el('hEnd').innerHTML = `❤️<span>${gs.end}</span>`;
  el('hRank').textContent = tx.ranks[ri];
  el('hGold').textContent = gs.gold;
  el('ghName').textContent = gs.name;
}

    {id:'shop',ico:'🛒',lbl:tx.navShop},
    {id:'ach',ico:'🏆',lbl:tx.navAch},
    {id:'mus',ico:'📚',lbl:tx.navMus},
    {id:'cult',ico:'🏛️',lbl:tx.navCult},

  document.querySelectorAll('.pnl').forEach(p => p.classList.remove('on'));
  el('p-'+id).classList.add('on');
  buildNav();
  switch(id) {
    case 'home': buildHome(); break;
    case 'battle': buildBattle(); break;
    case 'train': buildTrain(); break;
    case 'tour': buildTour(); break;
    case 'shop': buildShop(); break;
    case 'ach': buildAch(); break;
    case 'mus': buildMus(); break;
    case 'cult': buildCult(); break;
    case 'lb': buildLb(); break;
  }
}

let oppIdx = -1;
function selectOpp(i) {

function renderBattleUI() {

function drawBattleCanvas() {

  // players

  ctx.fillText('🤼',540/4,65);
  ctx.fillText('🤼',540*3/4,65);
  ctx.font='bold 13px Arial'; ctx.fillStyle='rgba(212,175,55,.8)';
  ctx.fillText(gs.name,540/4,110);
  if(battleState) ctx.fillText(battleState.opp.n,540*3/4,110);
  ctx.fillStyle='rgba(212,175,55,.15)';
  ctx.fillRect(540/2-1,20,2,90);
}

let selectedMove = null;
function pickMove(moveIdx) {
  if(!battleState || battleState.phase!=='select') return;
  selectedMove = moveIdx;
  battleState.phase = 'timing';
  const tx = S[lang];
  el('bRule').textContent = tx.bRuleTiming;
  renderBattleUI();
}

let timingPos = 0, timingDir = 1, timingSpeed = 2.2;
function startTiming() {
  if(timingAnim) cancelAnimationFrame(timingAnim);
  timingPos = 0; timingDir = 1;
  const bar = el('timingBar'); if(!bar) return;
  const bw = bar.offsetWidth || 300;
  const curW = 18;
  const zoneStart = 0.35, zoneW = 0.22;
  const zone = el('tZone');
  if(zone){ zone.style.left = (zoneStart*100)+'%'; zone.style.width = (zoneW*100)+'%'; }
  const tx = S[lang];
  if(selectedMove!==null){
    const m = tx.moves[selectedMove];
    el('timingLbl') && (el('timingLbl').textContent = m.ico+' '+m.n+' — '+m.s);
  }
  function animate(){
    timingPos += timingDir * timingSpeed / (bw - curW) * 100;
    if(timingPos >= 79){ timingPos=79; timingDir=-1; }
    if(timingPos <= 0){ timingPos=0; timingDir=1; }
    const cur = el('tCursor');
    if(cur) cur.style.left = timingPos+'%';
    timingAnim = requestAnimationFrame(animate);
  }
  timingAnim = requestAnimationFrame(animate);
}

function timingTap(){ doTimingResult(); }
document.addEventListener('keydown', function(e){
  if(e.code==='Space' && battleState && battleState.phase==='timing'){
    e.preventDefault();
    doTimingResult();
  }
});
// Touch tap anywhere on screen to fire timing
document.addEventListener('touchstart', function(e){
  if(battleState && battleState.phase==='timing'){
    e.preventDefault();
    doTimingResult();
  }
},{passive:false});

function doTimingResult() {
  if(!battleState || battleState.phase!=='timing') return;
  if(timingAnim){ cancelAnimationFrame(timingAnim); timingAnim=null; }
  const tx = S[lang]; const b = battleState;
  const m = tx.moves[selectedMove];
  const zoneStart=35, zoneEnd=57;
  const perfect = timingPos>=zoneStart && timingPos<=zoneEnd;
  const hit = perfect || (Math.random()<m.h);
  const mult = perfect ? 1.5 : 1;
  b.phase = 'enemy';
  if(b.stam < m.c){ bLog(tx.bNoStam,'i'); }
  else {
    b.stam = Math.max(0, b.stam - m.c);
    if(hit){
      const dmg = Math.round((m.p + gs.str*0.5) * mult * (0.85+Math.random()*0.3));
      b.eHp = Math.max(0, b.eHp - dmg);
      if(perfect) bLog(tx.bPerfect,'s');
      bLog(sprintf(tx.bHit, m.n, b.opp.n, dmg),'s');
      floatDmg(dmg,'#2ecc71');
    } else {
      bLog(sprintf(tx.bMiss, m.n),'f');
    }
  }
  if(b.eHp <= 0){ endBattle(true); return; }
  // enemy turn
  setTimeout(()=>enemyTurn(), 700);
}

function enemyTurn() {
  if(!battleState) return;
  const tx = S[lang]; const b = battleState;
  const opp = tx.opps[b.oppIdx];
  const movePool = tx.moves.filter((_,i)=>i<=opp.rank+1);
  const em = movePool[Math.floor(Math.random()*movePool.length)];
  const ehit = Math.random() < em.h;
  el('bRule') && (el('bRule').textContent = sprintf(tx.bRuleEnemy, opp.n));
  if(ehit){
    const edm = Math.round((em.p + opp.str*0.4) * (0.8+Math.random()*0.4));
    b.pHp = Math.max(0, b.pHp - edm);
    bLog(sprintf(tx.bEHit, opp.ico, opp.n, em.n, edm),'e');
    floatDmg(edm,'#e74c3c');
  } else {
    bLog(sprintf(tx.bEMiss, opp.ico, opp.n, em.n),'n');
  }
  if(b.pHp <= 0){ endBattle(false); return; }
  b.phase = 'select';
  el('bRule') && (el('bRule').textContent = tx.bRulePlayer);
  renderBattleUI();
}

function endBattle(won) {
  if(timingAnim){ cancelAnimationFrame(timingAnim); timingAnim=null; }
  const tx = S[lang]; const b = battleState;
  const opp = tx.opps[b.oppIdx];
  gs.stamina = Math.max(0, b.stam);
  if(won){
    gs.wins++; gs.xp += opp.xp; gs.gold += opp.gold;
    gs.daily.battleWon++;
    checkRankUp(); checkAchs();
    setTimeout(submitScore, 1200); // silent auto-submit
    const ch = tx.challengeList[gs.daily.challengeIdx];
    if(ch.type==='win' && gs.daily.battleWon>=ch.n && !gs.daily.chDone){
      gs.daily.chDone=true; gs.xp+=ch.xp; gs.gold+=ch.gold;
    }
  } else { gs.losses++; }
  updateHeader(); battleState=null;
  showModal(
    won?tx.bWin:tx.bLose,
    won?'🏆':'💔',
    won?sprintf(tx.bWinMsg,opp.n):sprintf(tx.bLoseMsg,opp.n),
    [
      {l:tx.bAgain, fn:()=>selectOpp(oppIdx)},
      {l:tx.bHome, fn:()=>renderPanel('home')},
      won?null:{l:tx.bGoTrain, fn:()=>renderPanel('train')}
    ].filter(Boolean)
  );
}

function bLog(msg, type='n'){
  if(!battleState) return;
  battleState.log.unshift({m:msg,t:type});
  if(battleState.log.length>8) battleState.log.pop();
  const lg = el('bLog');
  if(lg) lg.innerHTML = battleState.log.map(l=>`<div class="le ${l.t}">${l.m}</div>`).join('');
}

function floatDmg(n, col) {
  const d = document.createElement('div');
  d.className='fdmg'; d.textContent='-'+n;
  d.style.cssText=`left:${30+Math.random()*40}%;top:40%;color:${col}`;
  document.body.appendChild(d);
  setTimeout(()=>d.remove(),1300);
}

// ═══ RANK UP ═══
function checkRankUp() {
  const tx = S[lang];
  while(gs.rank < 5 && gs.xp >= tx.rankXps[gs.rank+1]){
    gs.rank++;
    const mv = [2,3,4,5,6,7][gs.rank-1];
    if(mv!==undefined && !gs.moves.includes(mv)){ gs.moves.push(mv); }
    updateHeader();
    setTimeout(()=>showModal(
      sprintf(tx.rankUpTitle,tx.ranks[gs.rank]),'🏆',
      tx.rankUpMsg,[{l:tx.gotIt}]
    ),300);
  }
}

function checkAchs() {
  const tx = S[lang];
  const checks = [
    {id:'w1', ok: gs.wins>=1},
    {id:'w5', ok: gs.wins>=5},
    {id:'w20',ok: gs.wins>=20},
    {id:'r1', ok: gs.rank>=1},
    {id:'r3', ok: gs.rank>=3},
    {id:'r5', ok: gs.rank>=5},
    {id:'t10',ok: (gs.totalTrains||0)>=10},
    {id:'m4', ok: gs.moves.length>=4},
    {id:'g100',ok: gs.gold>=100},
    {id:'n1', ok: gs.tourDone.some(Boolean)}
  ];
  checks.forEach(c=>{
    if(c.ok && !gs.achs[c.id]){
      gs.achs[c.id]=true;
      const a = tx.achs.find(x=>x.id===c.id);
      if(a) setTimeout(()=>showModal(sprintf(tx.achTitle,a.n),a.ico,a.d,[{l:tx.gotIt}]),400);
    }
  });
}

// ═══ TRAINING ═══
function buildTrain() {
  const tx = S[lang];
  el('p-train').innerHTML = `
    <div class="ptitle">${tx.ptTrain}</div>
    <div class="ib">${sprintf(tx.trTitle, gs.daily.trains)}</div>
    <div class="trgrid">${tx.trTypes.map((tr,i)=>{
      const done = gs.daily[tr.id+'Done'];
      return `<div class="trcard ${done?'dis':''}" onclick="${done?'':'startTrain('+i+')'}">
        <div class="trico">${tr.ico}</div>
        <h4>${tr.n}</h4>
        <p>${tr.d}</p>
        <div class="trgain">${done?tx.trDone:tr.g}</div>
      </div>`;
    }).join('')}</div>
    <div class="mga" id="mga"></div>
  `;
}

function startTrain(i) {
  const tx = S[lang];
  const tr = tx.trTypes[i];
  if(gs.daily.trains>=4) return;
  activeTraining = {idx:i, tr, count:0, done:false, timerStart:null};
  const mga = el('mga');
  mga.style.display='block';
  mga.innerHTML = `
    <h3>${tr.ico} ${tr.n}</h3>
    <p>${tr.d}</p>
    <div class="mga-bar"><div class="mga-fill" id="mgaFill"></div></div>
    <div class="mga-tim" id="mgaTim">0 / ${tr.tgt}</div>
    <div class="mga-hint">${tx.bTimingHint}</div>
    <button class="btn btn-sm btn-r" onclick="cancelTrain()">${tx.mgCancel}</button>
  `;
  mga.scrollIntoView({behavior:'smooth',block:'nearest'});
  if(tr.k==='hold') startHoldTrain(tr);
  else if(tr.k==='click'){ mga.querySelector('.mga-bar').style.cursor='pointer'; mga.querySelector('.mga-bar').onclick=()=>trainClick(); }
}

function trainClick() {
  if(!activeTraining||activeTraining.done) return;
  const tr = activeTraining.tr;
  activeTraining.count++;
  updateTrainUI();
  if(activeTraining.count>=tr.tgt) finishTrain();
}

let holdInterval=null;
function startHoldTrain(tr) {
  let held=false, elapsed=0;
  const target=tr.tgt*1000;
  document.addEventListener('keydown', hk); document.addEventListener('keyup', hu);
  // Touch hold support
  const bar = document.querySelector('.mga-bar');
  if(bar){
    bar.addEventListener('touchstart', ts, {passive:false});
    bar.addEventListener('touchend', te);
    bar.addEventListener('mousedown', ts);
    bar.addEventListener('mouseup', te);
  }
  function ts(e){ e.preventDefault&&e.preventDefault(); if(!held){ held=true; activeTraining.timerStart=Date.now(); holdInterval=setInterval(()=>{ elapsed=Date.now()-activeTraining.timerStart; activeTraining.count=elapsed/1000; updateTrainUI(); if(elapsed>=target) finishTrain(); },50); } }
  function te(){ held=false; clearInterval(holdInterval); }
  function hk(e){ if(e.code==='Space') ts(e); }
  function hu(e){ if(e.code==='Space') te(); }
  activeTraining._cleanup = ()=>{
    document.removeEventListener('keydown',hk); document.removeEventListener('keyup',hu);
    const b=document.querySelector('.mga-bar');
    if(b){ b.removeEventListener('touchstart',ts); b.removeEventListener('touchend',te); b.removeEventListener('mousedown',ts); b.removeEventListener('mouseup',te); }
    clearInterval(holdInterval);
  };
}

document.addEventListener('keydown', function(e){
  if(e.code==='Space' && activeTraining && !activeTraining.done){
    if(activeTraining.tr.k==='spam'){ e.preventDefault(); activeTraining.count++; updateTrainUI(); if(activeTraining.count>=activeTraining.tr.tgt) finishTrain(); }
  }
  if(e.code==='KeyX' && activeTraining && !activeTraining.done && activeTraining.tr.k==='spam'){
    activeTraining.count++; updateTrainUI(); if(activeTraining.count>=activeTraining.tr.tgt) finishTrain();
  }
});

// Click + touch for training mini-game bar
function _trainTap(e){
  if(!activeTraining || activeTraining.done) return;
  if(activeTraining.tr.k==='click') trainClick();
  else if(activeTraining.tr.k==='spam'){ activeTraining.count++; updateTrainUI(); if(activeTraining.count>=activeTraining.tr.tgt) finishTrain(); }
}
el('p-train').addEventListener('click', function(e){ if(e.target.closest('.mga-bar')) _trainTap(e); });
el('p-train').addEventListener('touchstart', function(e){ if(e.target.closest('.mga-bar')){ e.preventDefault(); _trainTap(e); } },{passive:false});

function updateTrainUI() {
  if(!activeTraining) return;
  const tr = activeTraining.tr;
  const pct = Math.min(100, (activeTraining.count/tr.tgt)*100);
  const fill = el('mgaFill'); if(fill) fill.style.width=pct+'%';
  const tim = el('mgaTim'); if(tim) tim.textContent = (tr.k==='hold'?activeTraining.count.toFixed(1):activeTraining.count)+' / '+tr.tgt;
}

function finishTrain() {
  if(!activeTraining||activeTraining.done) return;
  activeTraining.done=true;
  if(activeTraining._cleanup) activeTraining._cleanup();
  const tx = S[lang];
  const tr = activeTraining.tr;
  gs[tr.stat] += 2; gs.xp += 12;
  gs.daily.trains++;
  gs.daily[tr.id+'Done'] = true;
  gs.totalTrains = (gs.totalTrains||0)+1;
  checkRankUp(); checkAchs(); updateHeader();
  const mga = el('mga');
  if(mga) mga.innerHTML = `<h3 style="color:var(--lg)">${tx.trFinish}</h3><p>${tr.g}</p><p>${tx.trGain}</p><button class="btn btn-sm" onclick="buildTrain()">${tx.gotIt}</button>`;
  const ch = tx.challengeList[gs.daily.challengeIdx];
  if(ch.type==='train' && gs.daily.trains>=ch.n && !gs.daily.chDone){
    gs.daily.chDone=true; gs.xp+=ch.xp; gs.gold+=ch.gold;
  }
}

function cancelTrain() {
  if(activeTraining&&activeTraining._cleanup) activeTraining._cleanup();

// ═══ TOURNAMENT ═══
function buildTour() {
  const tx = S[lang];
  el('p-tour').innerHTML = `
    <div class="ptitle">${tx.ptTour}</div>
    ${tx.tourLevels.map((lv,li)=>{
      const locked = lv.rnk > gs.rank;
      const done = gs.tourDone[li];
      return `<div class="tlvl">
        <h3>${lv.ico} ${lv.n} ${done?'✅':locked?'🔒':''}</h3>
        ${locked?`<div class="ib">${sprintf(tx.tourLocked,tx.ranks[lv.rnk])}</div>`:`
          ${done?`<div class="ib green">${tx.tourDone}</div>`:`
            <button class="btn btn-sm" onclick="startTour(${li})">${tx.tourEnter}</button>
          `}
          <div style="margin-top:8px">${lv.ops.map(oi=>{const o=tx.opps[oi];return`<div class="tmatch"><span>${o.ico}</span><span>${o.n}</span><span style="margin-left:auto;font-size:.7em">${o.diff}</span></div>`;}).join('')}</div>
        `}
      </div>`;
    }).join('')}
  `;
}

function startTour(li) {
  tourState = {li, step:0, lv:S[lang].tourLevels[li]};
  nextTourMatch();
}

function nextTourMatch() {
  if(!tourState) return;
  const tx = S[lang]; const lv = tx.tourLevels[tourState.li];
  if(tourState.step>=lv.ops.length){ gs.tourDone[tourState.li]=true; gs.xp+=lv.xp; gs.gold+=lv.gold; checkAchs(); updateHeader(); tourState=null; buildTour(); showModal(sprintf(tx.tourWon,lv.n),'🏅',tx.tourDone,[{l:tx.gotIt}]); return; }
  const oi = lv.ops[tourState.step];
  showModal(sprintf(tx.tourFight,tx.opps[oi].n),tx.opps[oi].ico,tx.opps[oi].d,[
    {l:tx.tourFight.replace('%s',tx.opps[oi].n), fn:()=>{ tourBattle(oi); }},
    {l:tx.bHome, fn:()=>{ tourState=null; buildTour(); }}
  ]);
}

function tourBattle(oi) {
  oppIdx = oi; tourState.step++;
  const b = {
    pHp: gs.end*3+20, pMaxHp: gs.end*3+20,
    eHp: S[lang].opps[oi].hp, eMaxHp: S[lang].opps[oi].hp,
    stam: gs.stamina, maxStam: gs.maxStam,
    opp: S[lang].opps[oi], oppIdx: oi,
    phase:'select', log:[], isTour:true
  };
  battleState = b;
  renderPanel('battle');
  renderBattleUI();
}

function buyItem(i) {
  const tx = S[lang]; const item = tx.shopItems[i];
  if(gs.gold<item.p||gs.shopOwned[i]) return;
  gs.gold-=item.p; gs.shopOwned[i]=true;
  if(item.st==='all'){ gs.str+=item.v; gs.spd+=item.v; gs.bal+=item.v; gs.end+=item.v; }
  else if(item.st) gs[item.st]+=item.v;
  updateHeader(); checkAchs(); buildShop();
  showModal(tx.buyDone,'✅',item.n+' '+item.b,[{l:tx.gotIt}]);
}

function startQuiz(){
  quizState={q:0, score:0};
  renderQuiz();
}

function renderQuiz(){
  if(!quizState) return;
  const tx=S[lang];
  const qa=el('quizArea'); if(!qa) return;
  if(quizState.q>=tx.quiz.length){
    qa.innerHTML=`<div class="ib green">${tx.quizDone}</div><div class="ib">${sprintf(tx.quizScore2,quizState.score,tx.quiz.length)}</div><button class="btn btn-sm" onclick="startQuiz()">${tx.quizRetry}</button>`;
    return;
  }
  const q=tx.quiz[quizState.q];
  qa.innerHTML=`
    <div style="font-size:.82em;margin-bottom:10px;color:rgba(255,255,255,.9)">${sprintf(tx.quizScore,quizState.q+1,tx.quiz.length,quizState.score)}</div>
    <div style="font-size:.86em;font-weight:bold;margin-bottom:8px">${q.q}</div>
    ${q.opts.map((o,i)=>`<div class="qopt" id="qo${i}" onclick="ansQuiz(${i})">${o}</div>`).join('')}
    <div id="quizExpl" style="margin-top:8px;font-size:.78em;color:rgba(255,255,255,.5)"></div>
  `;
}

function ansQuiz(i){
  const tx=S[lang]; const q=tx.quiz[quizState.q];
  const correct=i===q.a;
  if(correct) quizState.score++;
  document.querySelectorAll('.qopt').forEach((o,idx)=>{
    o.classList.add(idx===q.a?'cor':idx===i&&!correct?'wrg':'');
    o.style.pointerEvents='none';
  });
  el('quizExpl').textContent=q.e;
  setTimeout(()=>{ quizState.q++; renderQuiz(); },1800);
}

// ═══ MODAL ═══
function showModal(title, ico, msg, btns) {
  el('mT').textContent=title; el('mI').textContent=ico;
  el('mP').innerHTML=msg.replace(/\n/g,'<br>');
  el('mX').innerHTML='';
  el('mB').innerHTML=btns.map((b,i)=>`<button class="btn ${i===0?'btn-r':'btn-b'} btn-sm" onclick="closeModal(${i})">${b.l}</button>`).join('');
  el('modal')._btns=btns;
  el('modal').classList.add('on');
}
function closeModal(i){
  const btns=el('modal')._btns;
  el('modal').classList.remove('on');
  if(btns&&btns[i]&&btns[i].fn) btns[i].fn();
}

    title:   {mn:'Тэргүүлэгч',   en:'Leaderboard',   tr:'ᠲᠡᠷᠢᠭᠦᠯᠡᠭᠴᠢ'},
    wins:    {mn:'🏆 Ялалт',      en:'🏆 Wins',        tr:'🏆 ᠢᠯᠠᠯᠲᠠ'},
    xp:      {mn:'⭐ XP',         en:'⭐ XP',          tr:'⭐ XP'},
    gold:    {mn:'🪙 Алт',        en:'🪙 Gold',        tr:'🪙 ᠠᠯᠲᠠ'},
    daily:   {mn:'📅 Өнөөдөр',    en:'📅 Today',       tr:'📅 ᠥᠨᠥᠳᠥᠷ'},
    loading: {mn:'Ачааллаж байна…',en:'Loading…',     tr:'ᠠᠴᠢᠶᠠᠯᠠᠵᠤ…'},
    nodata:  {mn:'Бичлэг алга',   en:'No entries yet',tr:'ᠪᠢᠴᠢᠯᠭᠡ ᠠᠯᠠᠭ᠎ᠠ'},
    submit:  {mn:'📤 Оноо илгээх',en:'📤 Submit Score',tr:'📤 ᠣᠨᠣᠭ᠎ᠠ ᠢᠯᠡᠭᠡᠬᠦ'},
    ok:      {mn:'✅ Илгээлээ!',  en:'✅ Submitted!',  tr:'✅ ᠠᠮᠵᠢᠯᠲᠠᠲᠠᠢ!'},
    err:     {mn:'❌ Алдаа',      en:'❌ Error',       tr:'❌ ᠠᠯᠳᠠᠭ᠎ᠠ'},
    nofire:  {mn:'Firebase холбогдоогүй',en:'Firebase not connected',tr:'Firebase ᠬᠣᠯᠪᠤᠭᠳᠠᠭᠰᠠᠨᠤᠭᠤᠢ'},
    live:    {mn:'Шууд',         en:'Live',           tr:'ᠱᠤᠤᠳ'},
    you:     {mn:'Таны байр',    en:'Your rank',      tr:'ᠲᠠᠨ ᠦ ᠪᠠᠢᠷᠢ'}
  };

function buildLb() {
  const tabs = ['wins','xp','gold','daily'];
  el('p-lb').innerHTML = `
    <div class="ptitle">🏆 ${lbLabel('title')}
      <span class="lb-live"><span class="lb-dot"></span>${lbLabel('live')}</span>
    </div>
    <div class="lb-tabs">
      ${tabs.map(t=>`<button class="lb-tab${lbTab===t?' on':''}" onclick="switchLbTab('${t}')">${lbLabel(t)}</button>`).join('')}
    </div>
    <div id="lbContent"><div class="lb-loading">⏳ ${lbLabel('loading')}</div></div>
    <div class="lb-submit">
      <button class="btn btn-r" onclick="doSubmitScore()" id="lbSubmitBtn">${lbLabel('submit')}</button>
      <div class="lb-submit-msg" id="lbSubmitMsg"></div>
    </div>
  `;
  loadLbData();
}

function switchLbTab(tab) {
  if(lbUnsubscribe){ lbUnsubscribe(); lbUnsubscribe=null; }
  lbTab = tab;
  buildLb();
}

function loadLbData() {
  if (!db) {
    el('lbContent').innerHTML = `<div class="lb-err">🔌 ${lbLabel('nofire')}</div>`;
    return;
  }
  const col = db.collection('scores');
  let q;
  if      (lbTab==='wins')  q = col.orderBy('wins','desc').limit(10);
  else if (lbTab==='xp')    q = col.orderBy('xp','desc').limit(10);
  else if (lbTab==='gold')  q = col.orderBy('gold','desc').limit(10);
  else                      q = col.where('date','==',getToday()).orderBy('dailyWins','desc').limit(10);

  lbUnsubscribe = q.onSnapshot(snap => {
    renderLbEntries(snap.docs.map((d,i)=>({id:d.id, pos:i+1, ...d.data()})));
  }, err => {
    el('lbContent') && (el('lbContent').innerHTML = `<div class="lb-err">❌ ${err.message}</div>`);
  });
}

function renderLbEntries(entries) {
  const sf = {wins:'wins',xp:'xp',gold:'gold',daily:'dailyWins'}[lbTab];
  const medals = ['🥇','🥈','🥉'];

  if (!entries.length) {
    el('lbContent').innerHTML = `<div class="lb-empty">🏜️ ${lbLabel('nodata')}</div>`;
    return;
  }

  const fmt = n => (n||0).toLocaleString();
  let html = '';

  // ── Podium (top 3) ──
  if (entries.length >= 2) {
    const p = [entries[1]||null, entries[0]||null, entries[2]||null]; // L C R
    const ht = ['72px','94px','56px'];
    const cl = ['#9E9E9E','#D4AF37','#8D6E63'];
    const md = ['🥈','🥇','🥉'];
    html += `<div class="lb-podium">`;
    p.forEach((e,i) => {
      if (!e) { html+=`<div class="lb-pod-item"></div>`; return; }
      const me = e.id===playerId;
      html += `<div class="lb-pod-item${me?' me':''}">
        ${i===1?`<div class="lb-pod-crown">👑</div>`:''}
        <div class="lb-pod-name">${e.name||'?'}${me?' 👈':''}</div>
        <div class="lb-pod-rank-badge">${e.rankName||''}</div>
        <div class="lb-pod-score">${fmt(e[sf])}</div>
        <div class="lb-pod-base" style="height:${ht[i]};background:linear-gradient(180deg,${cl[i]}dd,${cl[i]}88)">
          <div style="font-size:1.9em;padding-top:4px">${md[i]}</div>
          <div class="lb-pod-pos">#${e.pos}</div>
        </div>
      </div>`;
    });
    html += `</div>`;
  }

  // ── Full ranked list ──
  html += `<div class="lb-list">`;
  entries.forEach((e,i) => {
    const me = e.id===playerId;
    html += `<div class="lb-row${me?' me':''}">
      <span class="lb-pos">${i<3?medals[i]:'#'+(i+1)}</span>
      <span class="lb-name">${e.name||'?'}${me?' 👈':''}</span>
      <span class="lb-rank-chip">${e.rankName||''}</span>
      <span class="lb-score">${fmt(e[sf])}</span>
    </div>`;
  });
  html += `</div>`;

  el('lbContent').innerHTML = html;
}

async function doSubmitScore() {
  const btn = el('lbSubmitBtn'); const msg = el('lbSubmitMsg');
  if (!gs) { if(msg) msg.textContent='⚠️ Start a game first!'; return; }
  if (btn) { btn.disabled=true; btn.textContent='⏳…'; }
  const ok = await submitScore();
  if (btn) { btn.disabled=false; btn.textContent=lbLabel('submit'); }
  if (msg) { msg.textContent = ok ? lbLabel('ok') : lbLabel('err'); setTimeout(()=>{ if(msg) msg.textContent=''; },3000); }
}
